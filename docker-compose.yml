version: '3'

services:
  db:
    image: postgres:13
    shm_size: 128mb
    env_file: .env
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always

  rabbitmq:
    image: rabbitmq:3-management
    restart: always

  weather:
    image: ghcr.io/pyobs/pyobs-weather:latest
    env_file: .env
    volumes:
      - staticfiles:/static
    depends_on:
      - db
    restart: always
    command: >
      bash -c "python manage.py collectstatic --no-input &&
               python manage.py migrate &&
               gunicorn --workers=3 pyobs_weather.wsgi -b 0.0.0.0:8002"

  celery_worker:
    image: ghcr.io/pyobs/pyobs-weather:latest
    command: python -m celery -A pyobs_weather worker --loglevel=info
    env_file: .env
    depends_on:
      - db
      - rabbitmq
    restart: always

  celery_beat:
    image: ghcr.io/pyobs/pyobs-weather:latest
    command: python -m celery -A pyobs_weather beat --scheduler django --loglevel=info
    env_file: .env
    depends_on:
      - db
      - rabbitmq
    restart: always

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - staticfiles:/static:ro
    depends_on:
      - weather
    ports:
      - "80:80"
    restart: always

volumes:
  pgdata:
  staticfiles:
